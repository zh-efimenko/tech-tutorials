name: clickhouse

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3.2.39
    container_name: clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP protocol
      - "9009:9009"   # Interserver replication
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--user", "default", "--password", "clickhouse", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clickhouse-data:
  clickhouse-logs:
